<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CINEMATLE</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Mono:wght@300;400;500&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a3a;
    --gold: #c9a84c;
    --gold-dim: #8a6e2e;
    --green: #2d6a4f;
    --green-bright: #52b788;
    --yellow: #7b5e1a;
    --yellow-bright: #e9c46a;
    --red: #6b2737;
    --text: #e8e4d9;
    --text-dim: #8a8578;
    --text-muted: #4a4840;
    --accent: #c9a84c;
    --film-strip: #1e1e2e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Film grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
    opacity: 0.4;
  }

  /* Film strip top */
  .film-strip {
    background: var(--film-strip);
    height: 28px;
    display: flex;
    align-items: center;
    gap: 0;
    overflow: hidden;
    border-bottom: 1px solid #000;
  }
  .film-hole {
    width: 16px;
    height: 12px;
    background: var(--bg);
    border-radius: 2px;
    margin: 0 8px;
    flex-shrink: 0;
    box-shadow: inset 0 0 0 1px #000;
  }

  header {
    text-align: center;
    padding: 24px 20px 16px;
    border-bottom: 1px solid var(--border);
    position: relative;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(42px, 8vw, 72px);
    letter-spacing: 0.2em;
    color: var(--gold);
    text-shadow: 0 0 40px rgba(201, 168, 76, 0.3), 2px 2px 0 #000;
    line-height: 1;
  }

  .tagline {
    font-size: 10px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-top: 4px;
  }

  .header-meta {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-top: 12px;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
  }

  .guesses-left {
    color: var(--gold);
    font-weight: 500;
  }

  /* Legend */
  .legend {
    display: flex;
    justify-content: center;
    gap: 16px;
    padding: 10px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    letter-spacing: 0.05em;
    color: var(--text-dim);
  }
  .legend-dot {
    width: 12px;
    height: 12px;
    border-radius: 2px;
  }
  .legend-dot.green { background: var(--green-bright); }
  .legend-dot.yellow { background: var(--yellow-bright); }
  .legend-dot.red { background: #4a1a24; border: 1px solid #6b2737; }

  /* Main layout */
  .main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 20px 16px;
  }

  /* Search input */
  .search-container {
    position: relative;
    margin-bottom: 20px;
  }

  .search-wrap {
    display: flex;
    gap: 10px;
    align-items: stretch;
  }

  .search-input-wrap {
    position: relative;
    flex: 1;
  }

  .search-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 14px 18px;
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    letter-spacing: 0.05em;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .search-input:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 1px var(--gold-dim), 0 0 20px rgba(201,168,76,0.08);
  }

  .search-input::placeholder { color: var(--text-muted); }

  .guess-btn {
    background: var(--gold);
    color: #0a0a0f;
    border: none;
    padding: 14px 28px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 0.15em;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    white-space: nowrap;
  }
  .guess-btn:hover { background: #ddb95c; }
  .guess-btn:active { transform: scale(0.98); }
  .guess-btn:disabled { background: var(--text-muted); cursor: not-allowed; }

  /* Autocomplete dropdown */
  .autocomplete {
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-top: none;
    z-index: 100;
    max-height: 220px;
    overflow-y: auto;
  }
  .autocomplete-item {
    padding: 10px 18px;
    cursor: pointer;
    font-size: 13px;
    color: var(--text);
    transition: background 0.1s;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .autocomplete-item:hover { background: var(--border); }
  .autocomplete-item .year-tag {
    font-size: 11px;
    color: var(--text-dim);
  }

  /* Column headers */
  .col-headers {
    display: grid;
    grid-template-columns: 160px repeat(9, 1fr);
    gap: 3px;
    margin-bottom: 4px;
  }
  .col-header {
    text-align: center;
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    padding: 4px 2px;
    line-height: 1.3;
  }
  .col-header:first-child { text-align: left; }

  /* Guess rows */
  .guesses-container {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .guess-row {
    display: grid;
    grid-template-columns: 160px repeat(9, 1fr);
    gap: 3px;
    animation: slideIn 0.3s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .guess-cell {
    padding: 10px 6px;
    text-align: center;
    font-size: 11px;
    letter-spacing: 0.03em;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 52px;
    line-height: 1.3;
    position: relative;
    transition: background 0.4s ease;
  }

  .guess-cell.movie-title {
    text-align: left;
    justify-content: flex-start;
    font-size: 12px;
    font-weight: 500;
    padding-left: 10px;
    background: var(--surface) !important;
    border-left: 2px solid var(--border);
  }

  .guess-cell.correct { background: var(--green); color: var(--green-bright); }
  .guess-cell.close { background: var(--yellow); color: var(--yellow-bright); }
  .guess-cell.wrong { background: #0e0e16; color: var(--text-muted); border: 1px solid #1a1a26; }

  .arrow-indicator {
    position: absolute;
    bottom: 3px;
    right: 4px;
    font-size: 9px;
    opacity: 0.7;
  }

  /* Hint box */
  .hint-box {
    background: linear-gradient(135deg, #1a1208, #12120e);
    border: 1px solid var(--gold-dim);
    padding: 14px 20px;
    margin-bottom: 12px;
    animation: fadeIn 0.5s ease;
  }
  .hint-label {
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: 0.2em;
    font-size: 14px;
    color: var(--gold);
    margin-bottom: 4px;
  }
  .hint-text {
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 0.05em;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  /* Win/Lose overlay */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 500;
    display: none;
  }
  .overlay.show { display: flex; animation: fadeIn 0.4s ease; }

  .result-card {
    background: var(--surface);
    border: 1px solid var(--gold-dim);
    padding: 40px 48px;
    text-align: center;
    max-width: 440px;
    width: 90%;
    box-shadow: 0 0 80px rgba(201,168,76,0.15);
  }

  .result-emoji { font-size: 48px; margin-bottom: 16px; }

  .result-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    letter-spacing: 0.2em;
    color: var(--gold);
    margin-bottom: 8px;
  }

  .result-movie {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 20px;
    color: var(--text);
    margin-bottom: 16px;
  }

  .result-detail {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 24px;
    line-height: 1.7;
  }

  .play-again-btn {
    background: var(--gold);
    color: #0a0a0f;
    border: none;
    padding: 14px 32px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 0.2em;
    cursor: pointer;
    transition: background 0.15s;
  }
  .play-again-btn:hover { background: #ddb95c; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); }

  /* Responsive */
  @media (max-width: 768px) {
    .col-headers, .guess-row {
      grid-template-columns: 110px repeat(9, 1fr);
    }
    .guess-cell { font-size: 9px; padding: 7px 2px; min-height: 44px; }
    .guess-cell.movie-title { font-size: 10px; }
    .col-header { font-size: 7.5px; }
  }

  .empty-rows {
    display: flex;
    flex-direction: column;
    gap: 3px;
    margin-top: 3px;
  }
  .empty-row {
    display: grid;
    grid-template-columns: 160px repeat(9, 1fr);
    gap: 3px;
    opacity: 0.25;
  }
  @media (max-width: 768px) {
    .empty-row { grid-template-columns: 110px repeat(9, 1fr); }
  }
  .empty-cell {
    height: 52px;
    background: var(--surface);
    border: 1px dashed var(--border);
  }
  .empty-cell:first-child { border-left: 2px solid var(--border); }

  .streak-bar {
    display: flex;
    justify-content: center;
    gap: 24px;
    padding: 8px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    color: var(--text-dim);
  }
  .streak-num { color: var(--gold); font-weight: 500; font-size: 14px; }
</style>
</head>
<body>

<div class="film-strip" id="filmStrip"></div>

<header>
  <div class="logo">CINEMATLE</div>
  <div class="tagline">Guess the Film — One Frame at a Time</div>
  <div class="header-meta">
    <span>Guesses: <span class="guesses-left" id="guessesLeft">10 / 10</span></span>
    <span>·</span>
    <span id="dateDisplay"></span>
  </div>
</header>

<div class="streak-bar">
  <span>Played: <span class="streak-num" id="statPlayed">0</span></span>
  <span>Won: <span class="streak-num" id="statWon">0</span></span>
  <span>Streak: <span class="streak-num" id="statStreak">0</span></span>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot green"></div> Exact match</div>
  <div class="legend-item"><div class="legend-dot yellow"></div> Close (±5 yrs / ±$5M / ±5pts)</div>
  <div class="legend-item"><div class="legend-dot red"></div> No match</div>
</div>

<div class="main">
  <div id="hintContainer"></div>

  <div class="search-container">
    <div class="search-wrap">
      <div class="search-input-wrap">
        <input type="text" class="search-input" id="searchInput" placeholder="Search for a movie title..." autocomplete="off">
        <div class="autocomplete" id="autocomplete" style="display:none"></div>
      </div>
      <button class="guess-btn" id="guessBtn">GUESS</button>
    </div>
  </div>

  <div class="col-headers">
    <div class="col-header">FILM</div>
    <div class="col-header">Year</div>
    <div class="col-header">Genre</div>
    <div class="col-header">Rating</div>
    <div class="col-header">Box Office</div>
    <div class="col-header">RT Score</div>
    <div class="col-header">Studio</div>
    <div class="col-header">Director</div>
    <div class="col-header">Lead Actor</div>
    <div class="col-header">Support</div>
  </div>

  <div class="guesses-container" id="guessesContainer"></div>
  <div class="empty-rows" id="emptyRows"></div>
</div>

<div class="overlay" id="overlay">
  <div class="result-card">
    <div class="result-emoji" id="resultEmoji"></div>
    <div class="result-title" id="resultTitle"></div>
    <div class="result-movie" id="resultMovie"></div>
    <div class="result-detail" id="resultDetail"></div>
    <button class="play-again-btn" onclick="newGame()">PLAY AGAIN</button>
  </div>
</div>

// ─── HINTS PER MOVIE (generated contextually) ─────────────────────────────────
const HINTS = {
  default_5: (m) => `This film has a Rotten Tomatoes score of ${m.rtScore}% and was directed by ${m.director.split(' ')[0]}...`,
  default_9: (m) => `The lead actor/actress is ${m.lead}. Think carefully...`,
};

// ─── GAME STATE ───────────────────────────────────────────────────────────────
let targetMovie = null;
let guessesUsed = 0;
const MAX_GUESSES = 10;
let selectedMovie = null;
let gameOver = false;
let stats = JSON.parse(localStorage.getItem('cinematle_stats') || '{"played":0,"won":0,"streak":0}');

const COLUMNS = ['year','genre','rating','boxOffice','rtScore','studio','director','lead','support'];
const COL_LABELS = { year:'Year', genre:'Genre', rating:'Rating', boxOffice:'Box Office', rtScore:'RT Score', studio:'Studio', director:'Director', lead:'Lead Actor', support:'Support' };

function pickDailyMovie() {
  const seed = Math.floor(Date.now() / 86400000);
  return MOVIES[seed % MOVIES.length];
}

function formatBoxOffice(n) {
  if (n >= 1000) return `$${(n/1000).toFixed(1)}B`;
  return `$${n}M`;
}

function getCellValue(movie, col) {
  if (col === 'boxOffice') return formatBoxOffice(movie[col]);
  return String(movie[col]);
}

function compareCell(guess, target, col) {
  const gv = guess[col];
  const tv = target[col];
  if (col === 'year') {
    if (gv === tv) return { state: 'correct', arrow: null };
    if (Math.abs(gv - tv) <= 5) return { state: 'close', arrow: gv < tv ? '↑' : '↓' };
    return { state: 'wrong', arrow: gv < tv ? '↑' : '↓' };
  }
  if (col === 'boxOffice') {
    if (gv === tv) return { state: 'correct', arrow: null };
    if (Math.abs(gv - tv) <= 5) return { state: 'close', arrow: gv < tv ? '↑' : '↓' };
    return { state: 'wrong', arrow: gv < tv ? '↑' : '↓' };
  }
  if (col === 'rtScore') {
    if (gv === tv) return { state: 'correct', arrow: null };
    if (Math.abs(gv - tv) <= 5) return { state: 'close', arrow: gv < tv ? '↑' : '↓' };
    return { state: 'wrong', arrow: gv < tv ? '↑' : '↓' };
  }
  return { state: gv === tv ? 'correct' : 'wrong', arrow: null };
}

function buildFilmStrip() {
  const strip = document.getElementById('filmStrip');
  for (let i = 0; i < 80; i++) {
    const hole = document.createElement('div');
    hole.className = 'film-hole';
    strip.appendChild(hole);
  }
}

function updateStatsDisplay() {
  document.getElementById('statPlayed').textContent = stats.played;
  document.getElementById('statWon').textContent = stats.won;
  document.getElementById('statStreak').textContent = stats.streak;
}

function updateGuessesLeft() {
  document.getElementById('guessesLeft').textContent = `${MAX_GUESSES - guessesUsed} / ${MAX_GUESSES}`;
}

function renderEmptyRows(count) {
  const container = document.getElementById('emptyRows');
  container.innerHTML = '';
  for (let i = 0; i < count; i++) {
    const row = document.createElement('div');
    row.className = 'empty-row';
    // title cell
    const title = document.createElement('div');
    title.className = 'empty-cell';
    row.appendChild(title);
    for (let j = 0; j < 9; j++) {
      const cell = document.createElement('div');
      cell.className = 'empty-cell';
      row.appendChild(cell);
    }
    container.appendChild(row);
  }
}

function addGuessRow(movie) {
  const container = document.getElementById('guessesContainer');
  const row = document.createElement('div');
  row.className = 'guess-row';

  // Title cell
  const titleCell = document.createElement('div');
  titleCell.className = 'guess-cell movie-title';
  titleCell.textContent = movie.title;
  row.appendChild(titleCell);

  // Data cells with staggered animation
  COLUMNS.forEach((col, i) => {
    const result = compareCell(movie, targetMovie, col);
    const cell = document.createElement('div');
    cell.className = `guess-cell ${result.state}`;
    cell.style.animationDelay = `${i * 80}ms`;
    cell.style.opacity = '0';
    setTimeout(() => { cell.style.opacity = '1'; }, i * 80);

    const val = document.createElement('span');
    val.textContent = getCellValue(movie, col);
    cell.appendChild(val);

    if (result.arrow) {
      const arrow = document.createElement('span');
      arrow.className = 'arrow-indicator';
      arrow.textContent = result.arrow;
      cell.appendChild(arrow);
    }
    row.appendChild(cell);
  });

  container.appendChild(row);
  renderEmptyRows(MAX_GUESSES - guessesUsed);
}

function showHint(guessNum) {
  const container = document.getElementById('hintContainer');
  let text = '';
  if (guessNum === 5) {
    text = `The film was released in ${targetMovie.year} and has a ${targetMovie.rtScore}% RT score.`;
  } else if (guessNum === 9) {
    text = `The lead actor/actress is <strong>${targetMovie.lead}</strong>. This is your last hint!`;
  }
  if (!text) return;

  const box = document.createElement('div');
  box.className = 'hint-box';
  box.innerHTML = `<div class="hint-label">🎬 Hint Unlocked — Guess ${guessNum}</div><div class="hint-text">${text}</div>`;
  container.appendChild(box);
}

function showResult(won) {
  gameOver = true;
  stats.played++;
  if (won) {
    stats.won++;
    stats.streak++;
  } else {
    stats.streak = 0;
  }
  localStorage.setItem('cinematle_stats', JSON.stringify(stats));
  updateStatsDisplay();

  document.getElementById('guessBtn').disabled = true;
  document.getElementById('searchInput').disabled = true;

  setTimeout(() => {
    document.getElementById('resultEmoji').textContent = won ? '🏆' : '🎬';
    document.getElementById('resultTitle').textContent = won ? 'CUT! PERFECT TAKE!' : 'THAT\'S A WRAP';
    document.getElementById('resultMovie').textContent = `"${targetMovie.title}"`;
    document.getElementById('resultDetail').innerHTML = won
      ? `You identified the film in <strong>${guessesUsed}</strong> guess${guessesUsed === 1 ? '' : 'es'}!<br>
         ${targetMovie.year} · ${targetMovie.genre} · Dir. ${targetMovie.director}`
      : `The film was <em>${targetMovie.title}</em> (${targetMovie.year})<br>
         Directed by ${targetMovie.director} · Starring ${targetMovie.lead}<br>
         Box Office: ${formatBoxOffice(targetMovie.boxOffice)} · RT: ${targetMovie.rtScore}%`;
    document.getElementById('overlay').classList.add('show');
  }, 600);
}

function submitGuess() {
  if (!selectedMovie || gameOver) return;
  if (guessesUsed >= MAX_GUESSES) return;

  guessesUsed++;
  addGuessRow(selectedMovie);
  updateGuessesLeft();

  if (guessesUsed === 5 || guessesUsed === 9) showHint(guessesUsed);

  if (selectedMovie.title === targetMovie.title) {
    showResult(true);
  } else if (guessesUsed >= MAX_GUESSES) {
    showResult(false);
  }

  // Reset input
  selectedMovie = null;
  document.getElementById('searchInput').value = '';
  document.getElementById('autocomplete').style.display = 'none';
  document.getElementById('guessBtn').disabled = true;
}

function filterMovies(query) {
  if (!query || query.length < 1) return [];
  const q = query.toLowerCase();
  return MOVIES
    .filter(m => m.title.toLowerCase().includes(q))
    .slice(0, 8);
}

function setupAutocomplete() {
  const input = document.getElementById('searchInput');
  const dropdown = document.getElementById('autocomplete');
  const btn = document.getElementById('guessBtn');

  input.addEventListener('input', () => {
    const q = input.value.trim();
    const results = filterMovies(q);
    if (results.length === 0 || q === '') {
      dropdown.style.display = 'none';
      selectedMovie = null;
      btn.disabled = true;
      return;
    }
    dropdown.innerHTML = '';
    results.forEach(movie => {
      const item = document.createElement('div');
      item.className = 'autocomplete-item';
      item.innerHTML = `<span>${movie.title}</span><span class="year-tag">${movie.year}</span>`;
      item.addEventListener('click', () => {
        selectedMovie = movie;
        input.value = movie.title;
        dropdown.style.display = 'none';
        btn.disabled = false;
      });
      dropdown.appendChild(item);
    });
    dropdown.style.display = 'block';
  });

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && selectedMovie) submitGuess();
  });

  document.addEventListener('click', (e) => {
    if (!e.target.closest('.search-input-wrap')) {
      dropdown.style.display = 'none';
    }
  });

  btn.addEventListener('click', submitGuess);
  btn.disabled = true;
}

function newGame() {
  guessesUsed = 0;
  selectedMovie = null;
  gameOver = false;
  targetMovie = MOVIES[Math.floor(Math.random() * MOVIES.length)];
  document.getElementById('guessesContainer').innerHTML = '';
  document.getElementById('hintContainer').innerHTML = '';
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('searchInput').value = '';
  document.getElementById('searchInput').disabled = false;
  document.getElementById('guessBtn').disabled = true;
  updateGuessesLeft();
  renderEmptyRows(MAX_GUESSES);
  updateStatsDisplay();
}

function init() {
  buildFilmStrip();

  // Set date
  const now = new Date();
  document.getElementById('dateDisplay').textContent = now.toLocaleDateString('en-US', { month:'long', day:'numeric', year:'numeric' });

  // Pick today's movie
  targetMovie = pickDailyMovie();

  setupAutocomplete();
  updateGuessesLeft();
  renderEmptyRows(MAX_GUESSES);
  updateStatsDisplay();
}

init();
</script>
